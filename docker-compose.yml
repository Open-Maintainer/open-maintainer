services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: open_maintainer
      POSTGRES_PASSWORD: open_maintainer
      POSTGRES_DB: open_maintainer
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_maintainer -d open_maintainer"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    working_dir: /app
    command: sh -c "bun install && bun run dev:api"
    env_file: .env
    environment:
      API_PORT: 4000
      DATABASE_URL: postgres://open_maintainer:open_maintainer@postgres:5432/open_maintainer
      REDIS_URL: redis://redis:6379
      OPEN_MAINTAINER_CODEX_MODEL: ${OPEN_MAINTAINER_CODEX_MODEL:-}
      OPEN_MAINTAINER_CLAUDE_MODEL: ${OPEN_MAINTAINER_CLAUDE_MODEL:-}
    volumes:
      - .:/app
      - ${HOME}/.codex:/root/.codex
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.config:/root/.config
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    working_dir: /app
    command: sh -c "bun install && bun run dev:worker"
    env_file: .env
    environment:
      API_BASE_URL: http://api:4000
      DATABASE_URL: postgres://open_maintainer:open_maintainer@postgres:5432/open_maintainer
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_started

  web:
    image: oven/bun:1
    working_dir: /app
    command: sh -c "rm -rf apps/web/.next && bun install && bun run dev:web"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://api:4000
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
