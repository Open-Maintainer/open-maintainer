  - Read the target file and a related caller, test, type definition, route,
    command, or config before editing.
  - Keep diffs bounded and avoid unrelated formatting, broad refactors,
    dependency churn, or lockfile churn.
  - Ground PR review findings in file paths, commands, or documented behavior.
  - Review correctness, security, data loss, auth, generated artifacts, docs,
    and validation evidence before style.
  - Separate blockers from non-blocking notes.
  - Include commands run and skipped checks with reasons in final notes.
  - Preserve existing context files by default; use force only for intentional
    overwrite flows.
  - Check or update README.md, CONTRIBUTING.md, docs/DEMO_RUNBOOK.md,
    docs/MVP_RELEASE_REVIEW.md, docs/ROADMAP.md, docs/V0_3_RELEASE_REVIEW.md,
    docs/V0_4_RELEASE_REVIEW.md, and local-docs/PRODUCT_PRD.md when relevant
    behavior changes.
  - "Safe edit zone: Package, app, and fixture source/test files may be edited
    when the task targets that surface and related manifest, tsconfig,
    caller/test, and docs are read first."
  - "Safe edit zone: Docs should be updated when user-facing behavior, setup,
    validation, smoke gates, or workflow behavior changes."
  - "Use caution: Generated context artifacts and Open Maintainer metadata
    require care because existing context files are preserved by default and
    force is required for overwrites."
  - "Use caution: Lockfiles require care; generated skills explicitly warn
