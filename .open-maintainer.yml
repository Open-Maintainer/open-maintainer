  - "Use caution: API webhook, GitHub App credentials, repository-content
    transfer, context PR writes, and local repository scanning/upload are
    high-risk surfaces."
  - "Use caution: Web local filesystem paths, uploaded repository files,
    provider forms, and API connectivity are sensitive dashboard surfaces."
  - "Do not edit without explicit instruction: Do not edit
