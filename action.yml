name: Open Maintainer
description: Run Open Maintainer audit checks, rule-grounded PR reviews, and optional context refresh PRs.
inputs:
  mode:
    description: Action mode. Use audit for non-mutating checks, review for PR review summaries, or refresh to open/update a context refresh PR.
    required: false
    default: audit
  fail-on-score-below:
    description: Fail when agent readiness is below this score.
    required: false
    default: "0"
  report-path:
    description: Path for the human-readable audit report.
    required: false
    default: $RUNNER_TEMP/open-maintainer-report.md
  fail-on-drift:
    description: Fail when generated context artifacts are stale.
    required: false
    default: "false"
  comment-on-pr:
    description: Comment on pull requests with readiness score, delta, drift diagnostics, changed surface, and refresh guidance.
    required: false
    default: "false"
  github-token:
    description: GitHub token used when comment-on-pr is true or mode is refresh.
    required: false
    default: ""
  generation-provider:
    description: Refresh generation provider. Use codex or claude with allow-model-content-transfer set to true.
    required: false
    default: codex
  generation-model:
    description: Optional model override passed to the selected model-backed generation provider.
    required: false
    default: ""
  allow-model-content-transfer:
    description: Explicit consent for model-backed refresh generation to send repository content to the selected provider CLI.
    required: false
    default: "false"
  review-provider:
    description: Review provider. Use codex or claude with allow-review-content-transfer set to true.
    required: false
    default: codex
  review-model:
    description: Optional model override passed to the selected model-backed review provider.
    required: false
    default: ""
  allow-review-content-transfer:
    description: Explicit consent for model-backed PR review to send repository content to the selected provider CLI.
    required: false
    default: "false"
  review-comment-on-pr:
    description: Opt in to one marked PR review summary comment in review mode. Requires issue comment write permission.
    required: false
    default: "false"
  review-inline-comments:
    description: Opt in to capped inline finding comments in review mode. Requires pull request write permission.
    required: false
    default: "false"
  review-inline-cap:
    description: Maximum inline review comments when review-inline-comments is true.
    required: false
    default: "5"
  context-target:
    description: Context instruction files to generate during refresh. One of codex, claude, or both.
    required: false
    default: codex
  skills-target:
    description: Skill families to generate during refresh. One of codex, claude, or both.
    required: false
    default: codex
  refresh-branch:
    description: Branch used for opt-in context refresh PRs.
    required: false
    default: open-maintainer/context-refresh
  refresh-title:
    description: Pull request title for opt-in context refresh PRs.
    required: false
    default: Update Open Maintainer context
  force:
    description: Overwrite maintainer-owned context files during refresh. Defaults to preserving them.
    required: false
    default: "false"
outputs:
  readiness-score:
    description: Current agent readiness score.
    value: ${{ steps.audit.outputs.score }}
  drift-detected:
    description: Whether generated context drift was detected.
    value: ${{ steps.doctor.outputs.drift-detected }}
  refresh-pr-url:
    description: Pull request URL created or updated by refresh mode.
    value: ${{ steps.refresh-pr.outputs.pr-url }}
runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        case "${{ inputs.mode }}" in
          audit|refresh|review) ;;
          *)
            echo "::error title=Open Maintainer::Unsupported mode '${{ inputs.mode }}'. Use 'audit', 'refresh', or 'review'."
            exit 2
            ;;
        esac
        case "${{ inputs.generation-provider }}" in
          codex|claude) ;;
          *)
            echo "::error title=Open Maintainer::Unsupported generation-provider '${{ inputs.generation-provider }}'. Use 'codex' or 'claude'."
            exit 2
            ;;
        esac
        case "${{ inputs.review-provider }}" in
          codex|claude) ;;
          *)
            echo "::error title=Open Maintainer::Unsupported review-provider '${{ inputs.review-provider }}'. Use 'codex' or 'claude'."
            exit 2
            ;;
        esac
        case "${{ inputs.context-target }}" in
          codex|claude|both) ;;
          *)
            echo "::error title=Open Maintainer::Unsupported context-target '${{ inputs.context-target }}'. Use 'codex', 'claude', or 'both'."
            exit 2
            ;;
        esac
        case "${{ inputs.skills-target }}" in
          codex|claude|both) ;;
          *)
            echo "::error title=Open Maintainer::Unsupported skills-target '${{ inputs.skills-target }}'. Use 'codex', 'claude', or 'both'."
            exit 2
            ;;
        esac
        if [ "${{ inputs.mode }}" = "refresh" ] &&
          [ "${{ inputs.allow-model-content-transfer }}" != "true" ]; then
          echo "::error title=Open Maintainer::Refresh requires allow-model-content-transfer: 'true'."
          exit 2
        fi
        if [ "${{ inputs.mode }}" = "review" ] &&
          [ "${{ inputs.allow-review-content-transfer }}" != "true" ]; then
          echo "::error title=Open Maintainer::Review requires allow-review-content-transfer: 'true'."
          exit 2
        fi
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: bun install --frozen-lockfile
    - name: Run audit
      id: audit
      shell: bash
      run: |
        set +e
        audit_output="$RUNNER_TEMP/open-maintainer-audit-output.txt"
        bun run --cwd "$GITHUB_ACTION_PATH" cli audit "$GITHUB_WORKSPACE" \
          --fail-on-score-below "${{ inputs.fail-on-score-below }}" \
          --report-path "${{ inputs.report-path }}" \
          --no-profile-write >"$audit_output" 2>&1
        audit_status=$?
        cat "$audit_output"
        score=$(sed -nE 's/^Agent Readiness: ([0-9]+)\/100$/\1/p' "$audit_output" | tail -n 1)
        echo "exit-code=$audit_status" >> "$GITHUB_OUTPUT"
        echo "score=$score" >> "$GITHUB_OUTPUT"
        echo "output-path=$audit_output" >> "$GITHUB_OUTPUT"
        exit 0
    - name: Run drift check
      id: doctor
      shell: bash
      run: |
        set +e
        doctor_output="$RUNNER_TEMP/open-maintainer-doctor-output.txt"
        bun run --cwd "$GITHUB_ACTION_PATH" cli doctor "$GITHUB_WORKSPACE" >"$doctor_output" 2>&1
        doctor_status=$?
        cat "$doctor_output"
        if grep -q '^drift:' "$doctor_output"; then
          drift_detected=true
        else
          drift_detected=false
        fi
        while IFS= read -r line; do
          case "$line" in
            missing:*|drift:*)
              echo "::warning title=Open Maintainer::$line"
              ;;
          esac
        done < "$doctor_output"
        echo "exit-code=$doctor_status" >> "$GITHUB_OUTPUT"
        echo "drift-detected=$drift_detected" >> "$GITHUB_OUTPUT"
        echo "output-path=$doctor_output" >> "$GITHUB_OUTPUT"
        exit 0
    - name: Compute base readiness
      id: base
      if: ${{ github.event_name == 'pull_request' }}
      shell: bash
      run: |
        set +e
        base_output="$RUNNER_TEMP/open-maintainer-base-audit-output.txt"
        base_dir="$RUNNER_TEMP/open-maintainer-base"
        if git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}" &&
          git worktree add --detach "$base_dir" FETCH_HEAD; then
          bun run --cwd "$GITHUB_ACTION_PATH" cli audit "$base_dir" \
            --report-path "$RUNNER_TEMP/open-maintainer-base-report.md" \
            --no-profile-write >"$base_output" 2>&1
          base_status=$?
        else
          base_status=1
          echo "Unable to fetch pull request base for readiness delta." >"$base_output"
        fi
        cat "$base_output"
        base_score=$(sed -nE 's/^Agent Readiness: ([0-9]+)\/100$/\1/p' "$base_output" | tail -n 1)
        git worktree remove --force "$base_dir" >/dev/null 2>&1
        echo "exit-code=$base_status" >> "$GITHUB_OUTPUT"
        echo "score=$base_score" >> "$GITHUB_OUTPUT"
        echo "output-path=$base_output" >> "$GITHUB_OUTPUT"
        exit 0
    - name: Render action summary
      id: summary
      shell: bash
      env:
        AUDIT_OUTPUT_PATH: ${{ steps.audit.outputs.output-path }}
        DOCTOR_OUTPUT_PATH: ${{ steps.doctor.outputs.output-path }}
        REPORT_PATH: ${{ inputs.report-path }}
        READINESS_SCORE: ${{ steps.audit.outputs.score }}
        BASE_READINESS_SCORE: ${{ steps.base.outputs.score }}
        AUDIT_EXIT_CODE: ${{ steps.audit.outputs.exit-code }}
        DOCTOR_EXIT_CODE: ${{ steps.doctor.outputs.exit-code }}
        DRIFT_DETECTED: ${{ steps.doctor.outputs.drift-detected }}
        MODE: ${{ inputs.mode }}
        EVENT_NAME: ${{ github.event_name }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        summary_path="$RUNNER_TEMP/open-maintainer-action-summary.md"
        changed_path="$RUNNER_TEMP/open-maintainer-changed-files.txt"
        if [ -n "$BASE_SHA" ] && git fetch --no-tags --depth=1 origin "$BASE_SHA" >/dev/null 2>&1; then
          git diff --name-only "$BASE_SHA"...HEAD >"$changed_path" 2>/dev/null || true
        else
          : >"$changed_path"
        fi
        node <<'NODE' >"$summary_path"
        const fs = require("node:fs");
        const read = (path) => (path && fs.existsSync(path) ? fs.readFileSync(path, "utf8").trim() : "");
        const listLines = (text, prefix) => text.split(/\r?\n/).filter((line) => line.startsWith(prefix));
        const auditOutput = read(process.env.AUDIT_OUTPUT_PATH);
        const doctorOutput = read(process.env.DOCTOR_OUTPUT_PATH);
        const report = read(process.env.REPORT_PATH);
        const changedFiles = read(`${process.env.RUNNER_TEMP}/open-maintainer-changed-files.txt`)
          .split(/\r?\n/)
          .filter(Boolean);
        const score = process.env.READINESS_SCORE || "unknown";
        const baseScore = process.env.BASE_READINESS_SCORE || "";
        const delta =
          score !== "unknown" && baseScore
            ? Number(score) - Number(baseScore)
            : null;
        const deltaLine =
          delta === null || Number.isNaN(delta)
            ? `Readiness delta: unavailable for ${process.env.EVENT_NAME}`
            : `Readiness delta: ${delta >= 0 ? "+" : ""}${delta} points`;
        const missing = listLines(doctorOutput, "missing:");
        const drift = listLines(doctorOutput, "drift:");
        const refreshNeeded = missing.length > 0 || drift.length > 0;
        const changedSurface =
          changedFiles.length > 0
            ? changedFiles.map((file) => `- ${file}`).join("\n")
            : `- No pull request changed files detected for ${process.env.EVENT_NAME}.`;
        const sections = [
          "## Open Maintainer",
          "",
          `Mode: ${process.env.MODE}`,
          `Agent Readiness: ${score}/100`,
          deltaLine,
          `Generated context drift: ${process.env.DRIFT_DETECTED === "true" ? "detected" : "not detected"}`,
          "",
          "### Changed Surface",
          changedSurface,
          "",
          "### Likely Tests",
          "- Run the repository quality gates listed in generated context or CONTRIBUTING.md.",
          "- Include focused tests for changed behavior when implementation files changed.",
          "",
          "### Docs Impact",
          "- Review docs when setup, CLI behavior, Action behavior, generated outputs, or dashboard workflows changed.",
          "",
          "### Missing Validation Evidence",
          `- Action audit exit code: ${process.env.AUDIT_EXIT_CODE || "unknown"}`,
          `- Doctor exit code: ${process.env.DOCTOR_EXIT_CODE || "unknown"}`,
          "",
          "### Context Artifacts",
          ...(missing.length > 0 ? missing.map((line) => `- ${line}`) : ["- No missing required artifacts reported."]),
          ...(drift.length > 0 ? drift.map((line) => `- ${line}`) : ["- No drift findings reported."]),
          "",
          "### Refresh Recommendation",
          refreshNeeded
            ? [
                "- Local fix:",
                "  ```sh",
                "  bun run cli generate . --model codex --context codex --skills codex --allow-write --refresh-generated",
                "  bun run cli doctor .",
                "  ```",
                "- Commit the refreshed Open Maintainer artifacts.",
                "- Or run this action with `mode: refresh`, `contents: write`, and `pull-requests: write` to open or update a context refresh PR.",
              ].join("\n")
            : "- No context refresh is recommended by the current audit.",
          "",
          "<details>",
          "<summary>Readiness report</summary>",
          "",
          "```text",
          report || "No report file was found.",
          "```",
          "</details>",
          "",
          "<details>",
          "<summary>Audit output</summary>",
          "",
          "```text",
          auditOutput,
          "```",
          "</details>",
          "",
          "<details>",
          "<summary>Context artifact check</summary>",
          "",
          "```text",
          doctorOutput,
          "```",
          "</details>",
        ];
        console.log(sections.join("\n"));
        NODE
        cat "$summary_path" >> "$GITHUB_STEP_SUMMARY"
        echo "summary-path=$summary_path" >> "$GITHUB_OUTPUT"
    - name: Run pull request review
      id: review
      if: ${{ inputs.mode == 'review' && github.event_name == 'pull_request' }}
      shell: bash
      run: |
        set +e
        review_output="$RUNNER_TEMP/open-maintainer-review.md"
        review_log="$RUNNER_TEMP/open-maintainer-review-output.txt"
        git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}" >/dev/null 2>&1 || true
        git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.head.sha }}" >/dev/null 2>&1 || true
        args=(
          "review"
          "$GITHUB_WORKSPACE"
          "--base-ref"
          "${{ github.event.pull_request.base.sha }}"
          "--head-ref"
          "${{ github.event.pull_request.head.sha }}"
          "--pr-number"
          "${{ github.event.pull_request.number }}"
          "--output-path"
          "$review_output"
          "--json"
          "--review-provider"
          "${{ inputs.review-provider }}"
          "--allow-model-content-transfer"
        )
        if [ -n "${{ inputs.review-model }}" ]; then
          args+=("--review-model" "${{ inputs.review-model }}")
        fi
        bun run --cwd "$GITHUB_ACTION_PATH" cli "${args[@]}" >"$review_log" 2>&1
        review_status=$?
        cat "$review_log"
        if [ -f "$review_output" ]; then
          cat "$review_output" >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "exit-code=$review_status" >> "$GITHUB_OUTPUT"
        echo "output-path=$review_output" >> "$GITHUB_OUTPUT"
        echo "log-path=$review_log" >> "$GITHUB_OUTPUT"
        exit "$review_status"
    - name: Skip pull request review
      if: ${{ inputs.mode == 'review' && github.event_name != 'pull_request' }}
      shell: bash
      run: |
        {
          echo "## Open Maintainer PR Review"
          echo
          echo "Review mode needs a pull_request event with base and head refs."
          echo "Current event: ${{ github.event_name }}"
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Comment review summary on pull request
      if: ${{ inputs.mode == 'review' && inputs.review-comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v8
      env:
        REVIEW_OUTPUT_PATH: ${{ steps.review.outputs.output-path }}
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const fs = require("node:fs");
          const marker = "<!-- open-maintainer-review-summary -->";
          const review = fs.readFileSync(process.env.REVIEW_OUTPUT_PATH, "utf8").trim();
          const body = review.startsWith(marker) ? review : `${marker}\n${review}`;
          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          try {
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find((comment) =>
              comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
          } catch (error) {
            core.setFailed(`Open Maintainer review was generated, but summary comment posting failed: ${error.message}`);
          }
    - name: Comment inline findings on pull request
      if: ${{ inputs.mode == 'review' && inputs.review-inline-comments == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v8
      env:
        REVIEW_JSON_PATH: ${{ steps.review.outputs.log-path }}
        REVIEW_INLINE_CAP: ${{ inputs.review-inline-cap }}
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const fs = require("node:fs");
          const marker = "<!-- open-maintainer-review-inline";
          const review = JSON.parse(fs.readFileSync(process.env.REVIEW_JSON_PATH, "utf8"));
          const severityRank = { blocker: 0, major: 1, minor: 2, note: 3 };
          const cap = Math.max(0, Number(process.env.REVIEW_INLINE_CAP || "0"));
          const changedFiles = new Map(review.changedFiles.map((file) => [file.path, file]));
          const { owner, repo } = context.repo;
          const pull_number = context.payload.pull_request.number;
          try {
            const existing = await github.rest.pulls.listReviewComments({
              owner,
              repo,
              pull_number,
              per_page: 100,
            });
            const existingFingerprints = new Set(existing.data.flatMap((comment) => {
              const match = comment.body?.match(/open-maintainer-review-inline fingerprint="([^"]+)"/);
              if (match?.[1]) return [match[1]];
              return comment.path && comment.line ? [`legacy:${comment.path}:${comment.line}`] : [];
            }));
            const comments = [];
            for (const finding of [...review.findings].sort((a, b) => {
              const severityDelta = severityRank[a.severity] - severityRank[b.severity];
              return severityDelta === 0 ? a.id.localeCompare(b.id) : severityDelta;
            })) {
              if (comments.length >= cap) break;
              if (!finding.path || !finding.line) continue;
              const changedFile = changedFiles.get(finding.path);
              if (!changedFile?.patch) continue;
              const fingerprint = `${finding.id}:${finding.path}:${finding.line}`;
              if (existingFingerprints.has(fingerprint) || existingFingerprints.has(`legacy:${finding.path}:${finding.line}`)) continue;
              comments.push({
                path: finding.path,
                line: finding.line,
                side: "RIGHT",
                body: [
                  `<!-- open-maintainer-review-inline fingerprint="${fingerprint}" -->`,
                  `**${finding.severity}: ${finding.title}**`,
                  "",
                  finding.body,
                ].join("\n"),
              });
            }
            if (comments.length === 0) {
              core.notice("Open Maintainer found no eligible inline review comments to publish.");
              return;
            }
            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              event: "COMMENT",
              body: "Open Maintainer inline review comments.",
              comments,
            });
          } catch (error) {
            core.setFailed(`Open Maintainer review was generated, but inline comment posting failed: ${error.message}`);
          }
    - name: Comment on pull request
      if: ${{ inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v8
      env:
        SUMMARY_PATH: ${{ steps.summary.outputs.summary-path }}
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const fs = require("node:fs");
          const marker = "<!-- open-maintainer-action-comment -->";
          const summary = fs.readFileSync(process.env.SUMMARY_PATH, "utf8").trim();
          const body = [marker, summary].join("\n");
          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          const comments = await github.rest.issues.listComments({
            owner,
            repo,
            issue_number,
            per_page: 100,
          });
          const existing = comments.data.find((comment) =>
            comment.body?.includes(marker)
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
          }
    - name: Generate refresh artifacts
      if: ${{ inputs.mode == 'refresh' }}
      shell: bash
      run: |
        args=(
          "generate"
          "$GITHUB_WORKSPACE"
          "--context"
          "${{ inputs.context-target }}"
          "--skills"
          "${{ inputs.skills-target }}"
          "--model"
          "${{ inputs.generation-provider }}"
          "--allow-write"
        )
        if [ -n "${{ inputs.generation-model }}" ]; then
          args+=("--llm-model" "${{ inputs.generation-model }}")
        fi
        if [ "${{ inputs.force }}" = "true" ]; then
          args+=("--force")
        else
          args+=("--refresh-generated")
        fi
        bun run --cwd "$GITHUB_ACTION_PATH" cli "${args[@]}"
    - name: Open refresh pull request
      id: refresh-pr
      if: ${{ inputs.mode == 'refresh' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token || github.token }}
      run: |
        set -euo pipefail
        branch_name="${{ inputs.refresh-branch }}"
        title="${{ inputs.refresh-title }}"
        base_branch="${{ github.event.repository.default_branch || github.ref_name }}"
        body_path="$RUNNER_TEMP/open-maintainer-refresh-pr-body.md"
        git config user.name "open-maintainer"
        git config user.email "open-maintainer@users.noreply.github.com"
        git checkout -B "$branch_name"
        for artifact_path in \
          AGENTS.md \
          CLAUDE.md \
          .github/copilot-instructions.md \
          .cursor/rules/open-maintainer.mdc \
          .agents/skills \
          .claude/skills \
          .open-maintainer/profile.json \
          .open-maintainer/report.md \
          .open-maintainer.yml; do
          if [ -e "$artifact_path" ]; then
            git add -- "$artifact_path"
          fi
        done
        if git diff --cached --quiet; then
          echo "No writable Open Maintainer context artifacts changed."
          echo "pr-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        git commit -m "chore: refresh Open Maintainer context"
        git push --force-with-lease origin "$branch_name"
        {
          echo "## Open Maintainer Context Refresh"
          echo
          echo "This pull request refreshes generated Open Maintainer context artifacts."
          echo
          echo "- Mode: ${{ inputs.mode }}"
          echo "- Generation provider: ${{ inputs.generation-provider }}"
          echo "- Maintainer-owned files preserved by default: ${{ inputs.force != 'true' }}"
          echo
          echo "### Audit Summary"
          echo
          cat "${{ steps.summary.outputs.summary-path }}"
        } >"$body_path"
        existing_url="$(gh pr list --head "$branch_name" --base "$base_branch" --state open --json url --jq '.[0].url // empty')"
        if [ -n "$existing_url" ]; then
          gh pr edit "$existing_url" --title "$title" --body-file "$body_path"
          pr_url="$existing_url"
        else
          pr_url="$(gh pr create --base "$base_branch" --head "$branch_name" --title "$title" --body-file "$body_path")"
        fi
        echo "pr-url=$pr_url" >> "$GITHUB_OUTPUT"
        echo "Refresh PR: $pr_url" >> "$GITHUB_STEP_SUMMARY"
    - name: Apply audit result
      shell: bash
      run: |
        audit_status="${{ steps.audit.outputs.exit-code }}"
        drift_detected="${{ steps.doctor.outputs.drift-detected }}"
        if [ "$audit_status" != "0" ]; then
          exit "$audit_status"
        fi
        if [ "${{ inputs.fail-on-drift }}" = "true" ] && [ "$drift_detected" = "true" ]; then
          echo "::error title=Open Maintainer::Generated context drift was detected."
          exit 1
        fi
