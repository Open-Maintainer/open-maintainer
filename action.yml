name: Open Maintainer Audit
description: Run Open Maintainer audit mode without mutating repository context files.
inputs:
  mode:
    description: Audit mode to run.
    required: false
    default: audit
  fail-on-score-below:
    description: Fail when agent readiness is below this score.
    required: false
    default: "0"
  report-path:
    description: Path for the human-readable audit report.
    required: false
    default: $RUNNER_TEMP/open-maintainer-report.md
runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
    - name: Run audit
      shell: bash
      run: >
        bun run cli audit "$GITHUB_WORKSPACE"
        --fail-on-score-below "${{ inputs.fail-on-score-below }}"
        --report-path "${{ inputs.report-path }}"
        --no-profile-write
